name: Release

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Same real-DB gate as ci.yaml `integration` — publish must not rely on mocked-only unit skips.
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write # npm Trusted Publishing (OIDC)
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: deebee
          POSTGRES_PASSWORD: deebee_e2e
          POSTGRES_DB: deebee_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U deebee -d deebee_e2e"
          --health-interval 5s --health-timeout 3s --health-retries 10
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: deebee_e2e
          MYSQL_DATABASE: deebee_e2e
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -pdeebee_e2e"
          --health-interval 5s --health-timeout 3s --health-retries 20
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: 'Y'
          MSSQL_SA_PASSWORD: DeeBee_e2e_1!
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P DeeBee_e2e_1! -Q 'SELECT 1' -b"
          --health-interval 10s --health-timeout 5s --health-retries 30 --health-start-period 30s
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup pnpm
        uses: pnpm/action-setup@v5
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm run typecheck
      - name: Lint
        run: pnpm run lint
      - name: Format check
        run: pnpm run format:check
      - name: Test (unit + real databases)
        run: pnpm run test
        env:
          DATABASE_URL: postgres://deebee:deebee_e2e@localhost:5432/deebee_e2e
          MYSQL_URL: mysql://root:deebee_e2e@localhost:3306/deebee_e2e
          MSSQL_CONNECTION_STRING: Server=localhost,1433;Database=master;User Id=sa;Password=DeeBee_e2e_1!;TrustServerCertificate=true;Encrypt=false
      - name: Build
        run: pnpm run build
      - name: Release
        env:
          GH_TOKEN: ${{ github.token }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm exec semantic-release
