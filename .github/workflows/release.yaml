name: Release

on:
   workflow_dispatch:

permissions:
   contents: read

jobs:
   release:
      name: Release
      runs-on: ubuntu-latest
      permissions:
         contents: write
         issues: write
         pull-requests: write
         id-token: write
      steps:
         - name: Checkout
           uses: actions/checkout@v4
           with:
              fetch-depth: 0
         - name: Setup pnpm
           uses: pnpm/action-setup@v4
         - name: Setup Node.js
           uses: actions/setup-node@v4
           with:
              node-version: "lts/*"
              cache: "pnpm"
         - name: Install dependencies
           run: pnpm install --frozen-lockfile
         - name: Run tests
           run: pnpm run test
         - name: Build
           run: pnpm run build
         - name: Release
           env:
              GH_TOKEN: ${{ secrets.GH_CLI_AUTH_TOKEN }}
              GITHUB_TOKEN: ${{ secrets.GH_CLI_AUTH_TOKEN }}
              NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
           run: pnpm exec semantic-release
