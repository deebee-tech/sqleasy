name: CI

on:
   push:
      branches: [main, beta, alpha, next]
   pull_request:
      branches: [main, beta, alpha, next]

jobs:
   ci:
      name: CI
      runs-on: ubuntu-latest
      steps:
         - uses: actions/checkout@v4
         - uses: pnpm/action-setup@v4
         - uses: actions/setup-node@v4
           with:
              node-version: "lts/*"
              cache: "pnpm"
         - run: pnpm install --frozen-lockfile
         - run: pnpm run typecheck
         - run: pnpm run lint
         - run: pnpm run format
         - run: pnpm run test
         - run: pnpm run build
