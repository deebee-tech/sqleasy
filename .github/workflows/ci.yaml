name: CI

on:
  push:
    branches: [main, beta, alpha, next]
  pull_request:
    branches: [main, beta, alpha, next]

jobs:
  # ── Gate 1: repo-wide quality + the guardrails that keep the monorepo honest ──
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'pnpm'
      # The Dart SDK is REQUIRED here, not only in the language matrix below: `turbo run lint` spans
      # the whole workspace, and both Dart packages implement `lint` as `dart analyze --fatal-infos`
      # (dart/query additionally runs its view generator with --check). Without the SDK this job fails
      # on `@sqleasy/dart-engine#lint` and takes every other task down with it, which is exactly what
      # happened on the first run that ever reached CI.
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo run typecheck lint
      # `format` is `prettier --write`, which rewrites files and always exits 0 — it could never fail
      # the build. `--check` is what actually gates.
      - run: pnpm run format:check
      # The root script is `prettier --check .`, which does NOT see Dart. Each Dart package implements
      # its own `format:check` as `dart format --set-exit-if-changed`, and without this line their
      # formatting was gated by nothing but habit. Scoped to ./dart/* deliberately: the TS packages are
      # already covered by the root run, and a package-level prettier does NOT read the root
      # .prettierignore, so it would fail on the generated CHANGELOG.md the root correctly ignores.
      - run: pnpm turbo run format:check --filter='./dart/*'
      - run: pnpm run spell

      # Every dependency must be `catalog:` or `workspace:` — no literal ranges anywhere.
      - run: pnpm run check:deps
      # A feature must not land for some dialects and silently skip others. Ratchet: fails only on a
      # NEW op x dialect gap. See docs/audits/dialect-parity-2026-07-19.md.
      - run: pnpm run check:parity
      # The contract is versioned independently of every implementation: content change => version bump.
      - run: pnpm run check:contract
      # The two ports must HIDE the same methods on the same dialects. A capability that is absent in
      # TypeScript but reachable in Dart is a broken promise in whichever port is wrong.
      - run: pnpm run check:surface
      # capabilities.json is GENERATED from typed-views.ts, decisions.json and the emission corpus, all
      # of which move. A stale manifest is worse than none: it still reads as authoritative while
      # describing a surface that no longer exists.
      - run: pnpm run check:capabilities

  # ── Gate 2: unit + EMISSION conformance, per language, NO database ──
  emission:
    name: Emission conformance (${{ matrix.lang }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lang: [ts, dart]
        # python / csharp / go join here as they land (phase 6)
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'pnpm'
      - uses: dart-lang/setup-dart@v1
        if: matrix.lang == 'dart'
        with:
          sdk: stable
      - run: pnpm install --frozen-lockfile

      - name: TypeScript
        if: matrix.lang == 'ts'
        run: pnpm turbo run test --filter='./ts/*' --filter='./contract'

      # The Dart shim's `test` script runs verify_embed, then the VM suite, then dart2js.
      #
      # `dart test -p chrome` is NOT redundant with `dart test` and is NOT optional. On dart2js every
      # number is a JavaScript double, so `5.0 is int` is TRUE (false on the VM) and `(5.0).toString()`
      # is "5" (it is "5.0" on the VM); `is int` compiles to roughly `Math.floor(x) === x`, which makes
      # `double.infinity is int` true on the web. A port that gets this wrong emits DIFFERENT SQL on
      # Flutter web than on Flutter mobile, silently, and a single-platform run cannot see it. This has
      # already caught two real bugs in lib/src/values/sql_value.dart. Do not remove it.
      # `--filter='./dart/*'` and not just dart-query: dart/engine's no-DB suite (its normalization and
      # introspection unit tests) ran in NO job at all — Gate 3 covers only its harness-tagged lane.
      - name: Dart (VM + dart2js)
        if: matrix.lang == 'dart'
        run: pnpm turbo run test --filter='./dart/*'

  # ── Gate 3: NORMALIZATION + INTROSPECTION conformance against the shared harness ──
  #
  # One docker-compose definition, consumed identically by every language — that single shared
  # fixture environment is a large part of why these packages live in one repository.
  integration:
    name: Integration (real databases)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'pnpm'
      # Corpus C and D are replayed by BOTH ports against the SAME containers — that cross-port
      # agreement is the whole point, and it is what caught the MySQL TINYINT(1) and Uint8List bugs.
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: pnpm install --frozen-lockfile

      # `harness:up` includes `harness:seed`, which is the ONLY way any of these databases gets its
      # schema — no container mounts a seed file. Without this step all three are empty and every
      # golden fails. See the note at the top of docker-compose.harness.yml for why both of the
      # mount-based alternatives were removed: each of them fails SILENTLY.
      - name: Start and seed the shared harness
        run: pnpm run harness:up

      # The corpora connect to fixed localhost ports rather than reading env vars, so this step needs
      # no configuration — and cannot silently self-skip.
      - name: Corpus C + D conformance (every port)
        run: pnpm turbo run conformance:integration

      # NOTE: these env vars must be set explicitly. The engine's OTHER integration blocks are gated
      # on them and SELF-SKIP when absent — which reports green having tested nothing. That is exactly
      # how a dialect silently loses coverage, so treat a passing run with these unset as a failure.
      - name: Engine integration
        run: pnpm turbo run test --filter='@deebeetech/sqleasy-engine'
        env:
          HARNESS_DIALECTS: '1'
          DATABASE_URL: postgres://sqleasy:sqleasy_ci@localhost:5432/sqleasy_ci
          MYSQL_URL: mysql://root:sqleasy_ci@localhost:3306/sqleasy_ci
          MSSQL_CONNECTION_STRING: Server=localhost,1433;Database=master;User Id=sa;Password=SqlEasy_ci_1!;TrustServerCertificate=true;Encrypt=false

      - name: Harness logs on failure
        if: failure()
        run: docker compose -f docker-compose.harness.yml logs --tail=100
