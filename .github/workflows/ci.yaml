name: CI

on:
  push:
    branches: [main, beta, alpha, next]
  pull_request:
    branches: [main, beta, alpha, next]

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run lint
      # `format` is `prettier --write` and always exits 0; `--check` is what actually gates.
      - run: pnpm run format:check
      # Unit + mocked-driver + real in-memory SQLite tests. The pg/mysql/mssql integration blocks are
      # gated on DATABASE_URL / MYSQL_URL / MSSQL_CONNECTION_STRING and skip here — the `integration`
      # job below runs them against real databases.
      - run: pnpm run test
      - run: pnpm run build

  # Runs the same suite with real Postgres, MySQL, and SQL Server so the env-gated integration blocks
  # (real transactions, rollback, EXPLAIN, introspection) actually execute. Images/creds mirror
  # DeeBee's docker-compose.e2e.yml.
  integration:
    name: Integration (real databases)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: deebee
          POSTGRES_PASSWORD: deebee_e2e
          POSTGRES_DB: deebee_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U deebee -d deebee_e2e"
          --health-interval 5s --health-timeout 3s --health-retries 10
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: deebee_e2e
          MYSQL_DATABASE: deebee_e2e
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -pdeebee_e2e"
          --health-interval 5s --health-timeout 3s --health-retries 20
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: 'Y'
          MSSQL_SA_PASSWORD: DeeBee_e2e_1!
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P DeeBee_e2e_1! -Q 'SELECT 1' -b"
          --health-interval 10s --health-timeout 5s --health-retries 30 --health-start-period 30s
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test
        env:
          DATABASE_URL: postgres://deebee:deebee_e2e@localhost:5432/deebee_e2e
          MYSQL_URL: mysql://root:deebee_e2e@localhost:3306/deebee_e2e
          MSSQL_CONNECTION_STRING: Server=localhost,1433;Database=master;User Id=sa;Password=DeeBee_e2e_1!;TrustServerCertificate=true;Encrypt=false
