name: Publish JSR

# Manual escape hatch, now PER PACKAGE.
#
# semantic-release normally publishes JSR as part of Release; this exists for when a release run
# publishes npm but dies before reaching JSR (as 2.0.0 did), leaving the two registries on different
# versions. It publishes whatever version is currently in that package's jsr.json.
#
# It used to run at the repo root because the root WAS the package. It is now a workspace shell with
# no jsr.json, so the target must be chosen explicitly.
on:
  workflow_dispatch:
    inputs:
      package:
        description: Which package to publish to JSR
        required: true
        type: choice
        options:
          - ts/query
          - ts/engine

jobs:
  publish:
    name: Publish ${{ inputs.package }} to JSR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # JSR authenticates via OIDC — no token or secret required
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # jsr/Deno builds its module graph from node_modules. A release that reaches JSR through
      # semantic-release resolves it fine, while this workflow has failed with "Module not found" on a
      # bare npm import — so print the actual on-disk state rather than reasoning about it again.
      - name: Diagnose module resolution
        working-directory: ${{ inputs.package }}
        run: |
          echo "--- node_modules present? ---"
          ls -d node_modules 2>/dev/null || echo "NO node_modules in $(pwd)"
          echo "--- scoped dirs ---"
          ls node_modules 2>/dev/null | head -20 || true
          echo "--- can node resolve the failing import? ---"
          node -e "console.log(require.resolve('@libsql/client'))" || echo "UNRESOLVABLE"
          echo "--- what does pnpm think? ---"
          pnpm why @libsql/client --depth 0 2>&1 | head -12 || true

      - name: Publish to JSR
        working-directory: ${{ inputs.package }}
        run: pnpm dlx jsr publish
